<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Chill Guy Clicker</title>
</head>

<body>
    <div class="game">

        <div class="side left">
            <div id="reset"><img src="assets/reset.png" alt="reset"></div>
        </div>

        <div class="main">
            <h1>Score: <span id="scoreboard">0</span></h1>
            <div id="click"><img src="assets/chillguy.png" alt="chillguy"></div>
        </div>


        <div class="side right">
            <div id="shop"><img src="assets/basket.png" alt="basket"></div>
            <div id="auto"><img src="assets/autoclick.png" alt="auto"></div>
        </div>

    </div>

    <div id="info">
        <p>Click Chill Guy: +1 point</p>
        <p>Shop Upgrade: 10 points (+1 power)</p>
        <p>Auto Clicker: 20 points (+1 per second)</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
